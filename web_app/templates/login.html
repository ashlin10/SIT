<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - Vyper</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        .fade-in { animation: fadeIn 0.25s ease-out; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(-8px); } to { opacity: 1; transform: translateY(0); } }
    </style>
</head>
<body class="min-h-screen bg-gradient-to-br from-slate-900 via-slate-800 to-slate-900 flex items-center justify-center p-6">
    <div class="w-full max-w-md">
        <div class="bg-white/10 backdrop-blur rounded-2xl shadow-xl border border-white/10 overflow-hidden">
            <div class="p-8">
                <div class="flex items-center justify-center mb-6">
                    <div class="w-12 h-12 rounded-xl bg-blue-600 text-white flex items-center justify-center shadow-lg">
                        <i class="fas fa-wave-square"></i>
                    </div>
                </div>
                <h1 class="text-center text-white text-2xl font-semibold mb-2">Welcome to Vyper</h1>
                <p class="text-center text-slate-300 text-sm mb-6">Choose how you'd like to sign in</p>

                {% if error %}
                <div class="mb-4 px-4 py-3 rounded-lg bg-red-500/10 border border-red-500/30 text-red-200 text-sm">
                    <i class="fas fa-exclamation-triangle mr-2"></i>{{ error }}
                </div>
                {% endif %}

                <!-- Chooser View -->
                <div id="chooser-view" class="space-y-3 {% if show_local %}hidden{% endif %}">
                    <button onclick="showLocalLogin()" class="w-full py-3 rounded-lg bg-white/5 hover:bg-white/10 border border-white/10 hover:border-white/20 text-white font-medium transition flex items-center justify-center gap-3">
                        <i class="fas fa-user-lock text-blue-400"></i>
                        Sign in with Local Account
                    </button>
                    <div class="flex items-center gap-3 my-2">
                        <div class="flex-1 h-px bg-white/10"></div>
                        <span class="text-slate-400 text-xs uppercase tracking-wider">or</span>
                        <div class="flex-1 h-px bg-white/10"></div>
                    </div>
                    <a href="/sso/login?next={{ next }}" class="w-full py-3 rounded-lg bg-emerald-600 hover:bg-emerald-500 text-white font-medium shadow-lg shadow-emerald-600/20 transition flex items-center justify-center gap-3 no-underline">
                        <i class="fas fa-shield-halved text-white"></i>
                        Sign in with SSO (Duo)
                    </a>
                </div>

                <!-- Local Login Form (hidden by default, shown when Local is clicked or on error) -->
                <div id="local-login-view" class="{% if not show_local %}hidden{% endif %} fade-in">
                    <form action="/login" method="POST" class="space-y-4">
                        <input type="hidden" name="next" value="{{ next }}" />
                        <div>
                            <label class="block text-slate-200 text-sm mb-1" for="username">Username</label>
                            <div class="relative">
                                <span class="absolute inset-y-0 left-0 pl-3 flex items-center text-slate-400">
                                    <i class="fas fa-user"></i>
                                </span>
                                <input id="username" name="username" type="text" required autocomplete="username" class="w-full pl-10 pr-3 py-2 rounded-lg bg-white/5 border border-white/10 focus:outline-none focus:ring-2 focus:ring-blue-500 text-white placeholder-slate-400" placeholder="Enter username" />
                            </div>
                        </div>
                        <div>
                            <label class="block text-slate-200 text-sm mb-1" for="password">Password</label>
                            <div class="relative">
                                <span class="absolute inset-y-0 left-0 pl-3 flex items-center text-slate-400">
                                    <i class="fas fa-lock"></i>
                                </span>
                                <input id="password" name="password" type="password" required autocomplete="current-password" class="w-full pl-10 pr-3 py-2 rounded-lg bg-white/5 border border-white/10 focus:outline-none focus:ring-2 focus:ring-blue-500 text-white placeholder-slate-400" placeholder="Enter password" />
                            </div>
                        </div>
                        <button type="submit" class="w-full py-2.5 rounded-lg bg-blue-600 hover:bg-blue-500 text-white font-medium shadow-lg shadow-blue-600/30 transition">
                            <i class="fas fa-sign-in-alt mr-2"></i>Sign In
                        </button>
                    </form>
                    <button onclick="showChooser()" class="w-full mt-3 py-2 text-slate-400 hover:text-white text-sm transition flex items-center justify-center gap-2">
                        <i class="fas fa-arrow-left text-xs"></i> Back to sign-in options
                    </button>
                </div>

            </div>
        </div>
    </div>

    <script>
        function showLocalLogin() {
            document.getElementById('chooser-view').classList.add('hidden');
            const lv = document.getElementById('local-login-view');
            lv.classList.remove('hidden');
            lv.classList.add('fade-in');
            document.getElementById('username').focus();
        }
        function showChooser() {
            document.getElementById('local-login-view').classList.add('hidden');
            document.getElementById('chooser-view').classList.remove('hidden');
        }
    </script>
</body>
</html>
